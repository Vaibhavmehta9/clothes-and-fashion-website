<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />
    
    <!-- Primary SEO -->
    <title>StyleVerse – Wear Your World</title>
    <meta name="description" content="India's premier multi-vendor fashion marketplace. Shop the latest trends from top brands like Nike, Levi's, H&M, Zara, Puma and 100+ more. Free shipping above ₹999." />
    <meta name="keywords" content="fashion, clothing, online shopping, StyleVerse, Nike, Levi's, H&M, Zara, ethnic wear, footwear, accessories" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="StyleVerse – Wear Your World" />
    <meta property="og:description" content="India's premier fashion marketplace with 10,000+ products from top brands." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://styleverse.com" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StyleVerse – Wear Your World" />
    <meta name="twitter:description" content="India's premier fashion marketplace" />
    <meta name="twitter:image" content="/og-image.jpg" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "StyleVerse",
      "url": "https://styleverse.com",
      "logo": "https://styleverse.com/logo.svg",
      "description": "India's premier multi-vendor fashion marketplace",
      "sameAs": [
        "https://instagram.com/styleverse",
        "https://facebook.com/styleverse",
        "https://twitter.com/styleverse"
      ]
    }
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
